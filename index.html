<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hollowfication - Ichigo Kurosaki AR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b0000;
            --primary-glow: rgba(139, 0, 0, 0.6);
            --bg: #050505;
            --text: #ffffff;
            --accent: #ff0000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #video-feed {
            display: none;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        h1 {
            font-family: 'Metal Mania', cursive;
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text);
            text-shadow: 0 0 20px var(--primary-glow);
            animation: flicker 3s infinite alternate;
        }

        .status-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            pointer-events: auto;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
        }

        .status-dot.active {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .instructions {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid var(--primary);
            font-weight: 600;
            letter-spacing: 1px;
            color: #ccc;
            text-transform: uppercase;
            font-size: 0.8rem;
            animation: pulse 2s infinite;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 22%, 24%, 55% { opacity: 0.8; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 4px solid #111;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .reiatsu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, transparent 40%, rgba(139, 0, 0, 0.1) 100%);
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .reiatsu-overlay.active {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <p style="margin-top: 20px; font-family: 'Metal Mania'; letter-spacing: 2px;">Awakening Hollow...</p>
    </div>

    <div class="reiatsu-overlay" id="reiatsu-glow"></div>

    <div id="app-container">
        <video id="video-feed" autoplay playsinline></video>
        <canvas id="main-canvas"></canvas>

        <div id="ui-overlay">
            <div class="header">
                <div>
                    <h1>Hollow Mask</h1>
                    <p style="color: #666; margin-top: 5px; font-weight: 300;">Advanced Reiatsu Detection System</p>
                </div>
                <div class="status-panel">
                    <div class="status-item">
                        <div id="dot-face" class="status-dot"></div>
                        <span>Face Tracked</span>
                    </div>
                    <div class="status-item">
                        <div id="dot-hand" class="status-dot"></div>
                        <span>Hand Detected</span>
                    </div>
                    <div class="status-item">
                        <div id="dot-hollow" class="status-dot"></div>
                        <span style="font-weight: 600; color: var(--accent);">Hollow State</span>
                    </div>
                </div>
            </div>

            <div class="footer">
                <div class="instructions" id="instruction-text">Place Right Hand over Face to Hollowfy</div>
                <p style="font-size: 0.7rem; color: #444; text-transform: uppercase; letter-spacing: 2px;">Soul Reaper Protocol v1.4.2</p>
            </div>
        </div>
    </div>

    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <script>
        const videoElement = document.getElementById('video-feed');
        const canvasElement = document.getElementById('main-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingOverlay = document.getElementById('loading-overlay');
        const reiatsuGlow = document.getElementById('reiatsu-glow');
        const instructionText = document.getElementById('instruction-text');

        const dotFace = document.getElementById('dot-face');
        const dotHand = document.getElementById('dot-hand');
        const dotHollow = document.getElementById('dot-hollow');

        // State
        let hollowActive = false;
        let particles = [];
        let faceLandmarks = null;
        let lastFaceLandmarks = null;
        let rightHandLandmarks = null;
        let lastHollowState = false;
        let faceVisible = false;
        let animProgress = 0;

        // Sound Effects
        const hollowSound = new Audio('hollow sound.mpeg');
        hollowSound.volume = 0.8;

        function updateParticles(centerX, centerY, active) {
            if (!active && particles.length === 0) return;
            
            if (active && particles.length < 150) {
                // 1. Core Face Aura (Tight & Non-Obscuring)
                if (Math.random() > 0.6) {
                    particles.push({
                        x: centerX + (Math.random() - 0.5) * 120,
                        y: centerY + (Math.random() - 0.5) * 80,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: -Math.random() * 3 - 2,
                        width: Math.random() * 15 + 5,
                        height: Math.random() * 80 + 40,
                        color: Math.random() > 0.4 ? '#4a0000' : '#000000',
                        alpha: 0.6,
                        slant: (Math.random() - 0.5) * 0.2,
                        life: 1.0,
                        isWorld: false
                    });
                }

                // 2. Peripheral Spirit Pressure (Left & Right Sides ONLY)
                if (Math.random() > 0.4) {
                    const side = Math.random() > 0.5 ? 'left' : 'right';
                    const xPos = side === 'left' ? 
                                 Math.random() * (canvasElement.width * 0.3) : 
                                 canvasElement.width * 0.7 + Math.random() * (canvasElement.width * 0.3);
                    
                    particles.push({
                        x: xPos,
                        y: canvasElement.height + 100,
                        vx: (Math.random() - 0.5) * 3,
                        vy: -Math.random() * 12 - 8,
                        width: Math.random() * 100 + 40,
                        height: Math.random() * 900 + 300,
                        color: Math.random() > 0.3 ? '#3a0000' : '#000000',
                        alpha: 0.4,
                        slant: (side === 'left' ? -1 : 1) * (Math.random() * 0.5),
                        life: 1.2,
                        isWorld: true
                    });
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.015;
                p.life -= 0.015;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            canvasCtx.save();
            
            // Atmospheric floor glow
            if (hollowActive) {
                const grad = canvasCtx.createLinearGradient(0, canvasElement.height, 0, canvasElement.height - 400);
                grad.addColorStop(0, 'rgba(80, 0, 0, 0.3)');
                grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                canvasCtx.fillStyle = grad;
                canvasCtx.fillRect(0, canvasElement.height - 400, canvasElement.width, 400);
            }

            particles.forEach(p => {
                canvasCtx.save();
                canvasCtx.translate(p.x, p.y);
                canvasCtx.rotate(p.slant);
                
                const grad = canvasCtx.createLinearGradient(0, 0, 0, p.height);
                grad.addColorStop(0, p.color);
                grad.addColorStop(1, 'transparent');
                
                canvasCtx.globalAlpha = p.alpha;
                canvasCtx.fillStyle = grad;
                
                canvasCtx.beginPath();
                canvasCtx.moveTo(-p.width/2, 0);
                canvasCtx.lineTo(0, -p.height/6); 
                canvasCtx.lineTo(p.width/2, 0);
                canvasCtx.lineTo(0, p.height);
                canvasCtx.closePath();
                canvasCtx.fill();
                
                if (!p.isWorld) {
                    canvasCtx.shadowBlur = 15;
                    canvasCtx.shadowColor = '#ff0000';
                }
                canvasCtx.restore();
            });
            canvasCtx.restore();
        }

        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults((results) => {
            if (results.multiFaceLandmarks?.[0]) {
                faceVisible = true;
                faceLandmarks = results.multiFaceLandmarks[0];
                lastFaceLandmarks = faceLandmarks;
            } else {
                faceVisible = false;
            }
            dotFace.classList.toggle('active', faceVisible);
        });

        hands.onResults((results) => {
            rightHandLandmarks = null;
            if (results.multiHandLandmarks && results.multiHandedness) {
                results.multiHandedness.forEach((handedness, index) => {
                    if (handedness.label === 'Left') { 
                        rightHandLandmarks = results.multiHandLandmarks[index];
                    }
                });
            }
            dotHand.classList.toggle('active', !!rightHandLandmarks);
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
                await hands.send({image: videoElement});
                renderFrame();
            },
            width: 1280,
            height: 720
        });

        function renderFrame() {
            if (!videoElement.videoWidth) return;
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
            
            if (rightHandLandmarks && lastFaceLandmarks) {
                const handCenter = rightHandLandmarks[9];
                const nose = lastFaceLandmarks[1];
                const dist = Math.sqrt(Math.pow(nose.x - handCenter.x, 2) + Math.pow(nose.y - handCenter.y, 2));
                hollowActive = dist < 0.23;
            } else {
                hollowActive = false;
            }

            if (hollowActive) {
                if (animProgress < 1) animProgress = 1.0; // INSTANT
            } else {
                if (animProgress > 0) animProgress = 0; // INSTANT
            }

            if (hollowActive && !lastHollowState) {
                hollowSound.currentTime = 0;
                hollowSound.play().catch(e => {});
                reiatsuGlow.classList.add('active');
                instructionText.innerText = "HOLLOWFIED";
                instructionText.style.color = "#ff0000";
                instructionText.style.borderColor = "#ff0000";
                dotHollow.classList.add('active');
            } else if (!hollowActive && lastHollowState) {
                reiatsuGlow.classList.remove('active');
                instructionText.innerText = "Place Right Hand over Face to Hollowfy";
                instructionText.style.color = "#ccc";
                instructionText.style.borderColor = "var(--primary)";
                dotHollow.classList.remove('active');
            }
            lastHollowState = hollowActive;

            if (animProgress > 0.01 && lastFaceLandmarks) {
                drawHollowMask(lastFaceLandmarks, animProgress);
                const nose = lastFaceLandmarks[1];
                updateParticles(nose.x * canvasElement.width, nose.y * canvasElement.height, hollowActive);
                drawParticles();
            }

            canvasCtx.restore();
        }

        function drawHollowMask(landmarks, progress) {
            const w = canvasElement.width;
            const h = canvasElement.height;
            const nose = landmarks[1];
            const leftCheek = landmarks[234];
            const rightCheek = landmarks[454];

            const faceWidth = Math.sqrt(Math.pow(rightCheek.x - leftCheek.x, 2) + Math.pow(rightCheek.y - leftCheek.y, 2)) * w * 1.35;

            canvasCtx.save();
            canvasCtx.translate(nose.x * w, nose.y * h);
            // Increased scale for bigger mask
            canvasCtx.scale(1.15, 1.15); 
            canvasCtx.translate(-nose.x * w, -nose.y * h);

            // 1. Sculpted Skull Base with Texture
            const outline = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];
            canvasCtx.beginPath();
            canvasCtx.moveTo(landmarks[10].x * w, landmarks[10].y * h);
            outline.forEach(idx => canvasCtx.lineTo(landmarks[idx].x * w, landmarks[idx].y * h));
            canvasCtx.closePath();
            
            const baseGrad = canvasCtx.createRadialGradient(nose.x * w, nose.y * h, faceWidth * 0.1, nose.x * w, nose.y * h, faceWidth * 0.9);
            baseGrad.addColorStop(0, '#ffffff');
            baseGrad.addColorStop(0.7, '#f0f0f0');
            baseGrad.addColorStop(1, '#a0a0a0');
            canvasCtx.fillStyle = baseGrad;
            canvasCtx.fill();
            
            // Add Micro-Cracks for detail
            canvasCtx.strokeStyle = 'rgba(0,0,0,0.1)';
            canvasCtx.lineWidth = 0.5;
            [10, 234, 454, 152].forEach(idx => {
                const p = landmarks[idx];
                canvasCtx.beginPath();
                canvasCtx.moveTo(p.x * w, p.y * h);
                canvasCtx.lineTo((p.x + 0.02) * w, (p.y + 0.02) * h);
                canvasCtx.stroke();
            });

            // 2. High-Aesthetic Fanning Stripes with Outlines
            canvasCtx.fillStyle = '#7a0000';
            canvasCtx.strokeStyle = '#220000';
            canvasCtx.lineWidth = 1;
            const topStripes = [338, 297, 332, 284, 251, 389, 356, 454];
            topStripes.forEach((idx, i) => {
                ctxDrawSmoothStripe(canvasCtx, landmarks, 10, idx, i, w, h, 0.25 + i * 0.06);
            });
            ctxDrawSmoothStripe(canvasCtx, landmarks, 454, 377, 0, w, h, 0.35);
            ctxDrawSmoothStripe(canvasCtx, landmarks, 152, 400, 0, w, h, 0.25);

            // 3. Deep Void Eyes
            canvasCtx.fillStyle = '#000000';
            drawShape(canvasCtx, landmarks, [130, 247, 30, 29, 27, 28, 56, 190, 243, 112, 26, 22, 23, 24, 110, 25, 130], w, h);
            drawShape(canvasCtx, landmarks, [463, 414, 286, 258, 257, 259, 260, 467, 359, 263, 463], w, h);

            // Burning Irises
            canvasCtx.shadowBlur = 15;
            canvasCtx.shadowColor = '#ff8800';
            canvasCtx.fillStyle = '#ffaa00';
            const irisL = landmarks[468], irisR = landmarks[473];
            if (irisL && irisR) {
                canvasCtx.beginPath(); canvasCtx.arc(irisL.x * w, irisL.y * h, faceWidth * 0.065, 0, Math.PI * 2); canvasCtx.fill();
                canvasCtx.beginPath(); canvasCtx.arc(irisR.x * w, irisR.y * h, faceWidth * 0.065, 0, Math.PI * 2); canvasCtx.fill();
                canvasCtx.shadowBlur = 0;
                canvasCtx.fillStyle = '#000';
                canvasCtx.beginPath(); canvasCtx.arc(irisL.x * w, irisL.y * h, faceWidth * 0.02, 0, Math.PI * 2); canvasCtx.fill();
                canvasCtx.beginPath(); canvasCtx.arc(irisR.x * w, irisR.y * h, faceWidth * 0.02, 0, Math.PI * 2); canvasCtx.fill();
            }

            // 4. Individual Razor Teeth
            canvasCtx.shadowBlur = 0;
            const toothCount = 18;
            for (let i = 0; i < toothCount; i++) {
                const r = i / (toothCount - 1);
                const t = interpolate(landmarks[61], landmarks[291], r);
                const b = interpolate(landmarks[150], landmarks[379], r);
                const toothWidth = (faceWidth * 0.032);
                
                canvasCtx.beginPath();
                canvasCtx.moveTo(t.x * w - toothWidth, t.y * h);
                canvasCtx.lineTo(t.x * w + toothWidth, t.y * h);
                canvasCtx.lineTo(b.x * w, (b.y + 0.025) * h);
                canvasCtx.closePath();
                
                const toothGrad = canvasCtx.createLinearGradient(t.x * w, t.y * h, b.x * w, b.y * h);
                toothGrad.addColorStop(0, '#ffffff');
                toothGrad.addColorStop(1, '#cccccc');
                canvasCtx.fillStyle = toothGrad;
                canvasCtx.fill();
                
                canvasCtx.strokeStyle = 'rgba(0,0,0,0.5)';
                canvasCtx.lineWidth = 0.8;
                canvasCtx.stroke();
            }

            canvasCtx.restore();
        }

        function ctxDrawSmoothStripe(ctx, landmarks, startIdx, endIdx, i, w, h, width = 0.2) {
            const start = landmarks[startIdx];
            const end = landmarks[endIdx];
            const mid = interpolate(start, end, 0.5);
            
            ctx.beginPath();
            ctx.moveTo(start.x * w, start.y * h);
            const cp = { x: (mid.x + 0.06) * w, y: (mid.y - 0.06) * h };
            ctx.quadraticCurveTo(cp.x, cp.y, end.x * w, end.y * h);
            
            const w_px = (w * 0.06) * width;
            ctx.lineTo(end.x * w + w_px, end.y * h + 8);
            ctx.quadraticCurveTo(cp.x + w_px, cp.y + 8, start.x * w + w_px, start.y * h);
            ctx.fill();
            ctx.stroke(); // Draw outline
        }

        function drawShape(ctx, landmarks, indices, w, h) {
            ctx.beginPath();
            ctx.moveTo(landmarks[indices[0]].x * w, landmarks[indices[0]].y * h);
            indices.forEach(idx => ctx.lineTo(landmarks[idx].x * w, landmarks[idx].y * h));
            ctx.fill();
        }

        function interpolate(p1, p2, ratio) {
            return { x: p1.x + (p2.x - p1.x) * ratio, y: p1.y + (p2.y - p1.y) * ratio };
        }

        async function start() {
            try {
                await camera.start();
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 500);
            } catch (e) {
                alert("Camera error: " + e.message);
            }
        }
        start();

        function ctxDrawCurvedStripe(ctx, landmarks, startIdx, offset, w, h) {
            const start = landmarks[startIdx];
            const nose = landmarks[1];
            ctx.beginPath();
            ctx.moveTo(start.x * w, start.y * h);
            const cp1 = { x: (start.x + nose.x) / 2 * w, y: (start.y + 0.1) * h };
            const end = { x: (start.x - 0.05) * w, y: (start.y + 0.3) * h };
            ctx.quadraticCurveTo(cp1.x, cp1.y, end.x, end.y);
            ctx.lineTo(end.x + 12, end.y);
            ctx.quadraticCurveTo(cp1.x + 12, cp1.y - 5, (start.x + 0.02) * w, start.y * h);
            ctx.fill();
        }

        function drawShape(ctx, landmarks, indices, w, h) {
            ctx.beginPath();
            ctx.moveTo(landmarks[indices[0]].x * w, landmarks[indices[0]].y * h);
            indices.forEach(idx => ctx.lineTo(landmarks[idx].x * w, landmarks[idx].y * h));
            ctx.fill();
        }

        function interpolate(p1, p2, ratio) {
            return { x: p1.x + (p2.x - p1.x) * ratio, y: p1.y + (p2.y - p1.y) * ratio };
        }

        async function start() {
            try {
                await camera.start();
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 500);
            } catch (e) {
                alert("Camera error: " + e.message);
            }
        }
        start();

    </script>
</body>
</html>
